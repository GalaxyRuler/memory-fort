appId: io.alkulaib.memoryfort
productName: MemoryFort
copyright: Copyright © 2026 Memory Fort

directories:
  output: dist/electron-installer

# Only ship what the Electron main needs: compiled main + SPA assets + icon.
# tsdown bundles all Node deps into electron-main.mjs — no node_modules required.
files:
  - dist/electron-main.mjs
  # Self-contained worker bundles the dashboard schedulers + /api/health verify
  # spawn as child processes. electron-main.mjs inlines the spawn code but NOT
  # these entries, so they must be shipped explicitly or isolation silently
  # fails (workers not found → fail-soft → heavy work never runs).
  - dist/dashboard/dashboard-service.mjs
  - dist/dashboard/scheduled-vault-worker.mjs
  - dist/dashboard/verify-worker.mjs
  - dist/dashboard-ui/**
  - assets/memory_fort_icon_512.png

# Disable asar so the Node HTTP server can serve dashboard-ui files normally
asar: false

# Publish built artifacts to GitHub Releases (used by the release workflow)
publish:
  provider: github
  owner: GalaxyRuler
  repo: memory-fort

win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: assets/memory_fort_icon_512.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  runAfterFinish: true
  # Dash-separated on-disk name (default is "MemoryFort Setup X.Y.Z.exe" with
  # spaces, which GitHub rewrites to dots on upload — making the zipped copy's
  # name inconsistent with the dashed raw installer). dmg/AppImage already use
  # dashes by default.
  artifactName: ${productName}-Setup-${version}.${ext}

# macOS: Apple Silicon only — Intel (x64) is intentionally not built.
mac:
  target:
    - target: dmg
      arch:
        - arm64
  category: public.app-category.productivity
  icon: assets/memory_fort_icon_512.png

# Linux: AppImage runs on any distro (Debian/Ubuntu included), so no .deb.
linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Utility
  icon: assets/memory_fort_icon_512.png
