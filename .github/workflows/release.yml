name: Release (desktop binaries)

# Builds the Electron desktop app for Windows, macOS, and Linux, then attaches
# the installers to a GitHub Release. Triggered by pushing a version tag
# (e.g. `git tag v0.8.7 && git push origin v0.8.7`), or run manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the release and upload installers

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one platform failing must not block the others
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Verify Electron toolchain versions
        shell: bash
        run: |
          test "$(node -p "require('./node_modules/electron/package.json').version")" = "42.5.0"
          test "$(node -p "require('./node_modules/electron-builder/package.json').version")" = "26.15.5"
          test "$(node -p "require('./node_modules/@electron/rebuild/package.json').version")" = "4.0.4"
          npx electron --version
          npx electron-builder --version

      - name: Rebuild Electron native modules
        run: npm run electron:rebuild

      - name: Build (CLI + dashboard UI + electron main)
        run: npm run build

      - name: Package and publish desktop app
        # electron-builder defaults to the host OS target, so each matrix leg
        # produces its own installer (.exe / .dmg / .AppImage).
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple Developer cert in CI — skip signing instead of failing.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Browsers (Chrome SmartScreen heuristic) block direct downloads of
      # unsigned installers. Ship a .zip of each installer alongside the raw
      # file so the download is not blocked; the raw installers + latest*.yml
      # stay for the electron-updater feed. The .zip only fixes the download
      # block — the unsigned installer still warns on run (signing is the only
      # fix for that, and is intentionally never done).
      - name: Zip installer for browser-safe download (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist/electron-installer/*.exe | Select-Object -First 1
          if (-not $exe) { throw "No .exe installer found to zip" }
          $zip = "$($exe.FullName).zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zip -Force
          gh release upload ${{ github.ref_name }} $zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip installer for browser-safe download (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist/electron-installer
          shopt -s nullglob
          found=0
          for f in *.dmg *.AppImage; do
            found=1
            zip -q "$f.zip" "$f"
            gh release upload "${{ github.ref_name }}" "$f.zip" --clobber
          done
          if [ "$found" -eq 0 ]; then echo "No .dmg/.AppImage installer found to zip" >&2; exit 1; fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
