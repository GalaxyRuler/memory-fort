name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".claude/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".claude/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # The vitest suite is sharded across parallel runners and run SERIALLY within
  # each shard (--no-file-parallelism). Timing-sensitive routing suites (e.g.
  # test/dashboard/server.test.ts) starve and hit the 60s testTimeout when they
  # co-schedule with the native-addon (better-sqlite3/sqlite-vec) test workers on
  # a 2-core runner — they pass in isolation. Sharding + serial-within-shard
  # removes that CPU contention while staying fast via parallel shards.
  # See verify-tests-slow-flaky note.
  test:
    name: Test (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build
        # Tests need dist/ + routeTree.gen.ts (see test-build-prerequisites note).
        run: npm run build
      - name: Test (shard ${{ matrix.shard }}/3, serial within shard)
        run: npm test -- --shard=${{ matrix.shard }}/3 --no-file-parallelism --reporter=dot

  ci:
    name: Typecheck, build, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci): a Windows-generated package-lock.json prunes
        # electron-builder's cross-platform optional deps, so npm ci fails on the
        # Linux runner. Matches release.yml. See electron-builder-lockfile note.
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Typecheck UI
        run: npm run typecheck:ui

      - name: Scan for leaks
        run: npm run scan:leaks

      - name: Eval — retrieval (graph-aware)
        continue-on-error: true
        run: |
          node --max-old-space-size=512 dist/cli.mjs eval-retrieval \
            --json \
            --gold qa/graph-aware-gold.jsonl \
            --corpus qa/fixtures/graph-aware-vault \
          | node scripts/ci-eval-summary.mjs

      - name: Eval — dispatch policy
        continue-on-error: true
        run: |
          node dist/cli.mjs eval dispatch --json \
          | node scripts/ci-eval-summary.mjs

      - name: SDK (TypeScript) — install + typecheck + test + build
        run: |
          cd packages/sdk
          npm install
          npx tsc --noEmit
          npx vitest run --reporter=dot
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: SDK (Python) — install + test + build
        run: |
          cd packages/sdk-python
          pip install -e ".[test]" -q
          python -m pytest tests/ -q
          pip install build -q
          python -m build

      - name: Check package contents
        run: npm pack --dry-run 2>&1 | grep -E "^(npm notice (files|package size|unpacked size)|Tarball)"
