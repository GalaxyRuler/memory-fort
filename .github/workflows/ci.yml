name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Typecheck, build, test, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Typecheck UI
        run: npm run typecheck:ui

      - name: Scan for leaks
        run: npm run scan:leaks

      - name: Test
        run: npm test -- --reporter=dot

      - name: Eval — retrieval (graph-aware)
        continue-on-error: true
        run: |
          node --max-old-space-size=512 dist/cli.mjs eval-retrieval \
            --json \
            --gold qa/graph-aware-gold.jsonl \
            --corpus qa/fixtures/graph-aware-vault \
          | node scripts/ci-eval-summary.mjs

      - name: Eval — dispatch policy
        continue-on-error: true
        run: |
          node dist/cli.mjs eval dispatch --json \
          | node scripts/ci-eval-summary.mjs

      - name: Check package contents
        run: npm pack --dry-run 2>&1 | grep -E "^(npm notice (files|package size|unpacked size)|Tarball)"
