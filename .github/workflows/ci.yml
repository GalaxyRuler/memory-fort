name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".claude/**"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".claude/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # test/dashboard/server.test.ts is the one suite that flakes on the 2-core
  # ubuntu runner: its ~10 verify-job / search tests HANG and hit the 60s
  # testTimeout (not a slow assertion) when the suite runs under memory/CPU
  # pressure alongside the rest. It passes alone ("isolated"). So we run it on
  # its OWN fresh runner, and the rest of the suite (which does not flake) runs
  # separately. An earlier sharding+--no-file-parallelism attempt made it worse
  # (one worker for all files accumulates memory). See verify-tests-slow-flaky.
  test:
    name: Test (suite, excl. dashboard/server)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build
        # Tests need dist/ + routeTree.gen.ts (see test-build-prerequisites note).
        run: npm run build
      - name: Test (everything except dashboard/server)
        run: npm test -- --exclude '**/dashboard/server.test.ts' --reporter=dot

  test-server:
    name: Test (dashboard/server, isolated)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Test (dashboard/server.test.ts on a fresh runner)
        run: npm test -- test/dashboard/server.test.ts --reporter=dot

  ci:
    name: Typecheck, build, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        # npm install (not npm ci): a Windows-generated package-lock.json prunes
        # electron-builder's cross-platform optional deps, so npm ci fails on the
        # Linux runner. Matches release.yml. See electron-builder-lockfile note.
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Typecheck UI
        run: npm run typecheck:ui

      - name: Scan for leaks
        run: npm run scan:leaks

      - name: Eval — retrieval (graph-aware)
        continue-on-error: true
        run: |
          node --max-old-space-size=512 dist/cli.mjs eval-retrieval \
            --json \
            --gold qa/graph-aware-gold.jsonl \
            --corpus qa/fixtures/graph-aware-vault \
          | node scripts/ci-eval-summary.mjs

      - name: Eval — dispatch policy
        continue-on-error: true
        run: |
          node dist/cli.mjs eval dispatch --json \
          | node scripts/ci-eval-summary.mjs

      - name: SDK (TypeScript) — install + typecheck + test + build
        run: |
          cd packages/sdk
          npm install
          npx tsc --noEmit
          npx vitest run --reporter=dot
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: SDK (Python) — install + test + build
        run: |
          cd packages/sdk-python
          pip install -e ".[test]" -q
          python -m pytest tests/ -q
          pip install build -q
          python -m build

      - name: Check package contents
        run: npm pack --dry-run 2>&1 | grep -E "^(npm notice (files|package size|unpacked size)|Tarball)"
