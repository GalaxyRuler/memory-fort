name: Tri-OS Smoke

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "electron/**"
      - "packages/**"
      - "scripts/**"
      - "test/**"
      - "qa/**"
      - "vendor/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tsdown.config.js"
      - "electron-builder.yml"
      - ".github/workflows/smoke.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "electron/**"
      - "packages/**"
      - "scripts/**"
      - "test/**"
      - "qa/**"
      - "vendor/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig*.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "tsdown.config.js"
      - "electron-builder.yml"
      - ".github/workflows/smoke.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Set isolated memory root
        if: runner.os != 'Windows'
        shell: bash
        run: echo "MEMORY_ROOT=${RUNNER_TEMP}/memory-home" >> "$GITHUB_ENV"

      - name: Set isolated memory root
        if: runner.os == 'Windows'
        shell: pwsh
        run: '"MEMORY_ROOT=$env:RUNNER_TEMP\memory-home" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'

      - name: Smoke init
        if: runner.os != 'Windows'
        shell: bash
        run: node dist/cli.mjs init --yes --retrieval lexical --tools none

      - name: Smoke init
        if: runner.os == 'Windows'
        shell: pwsh
        run: node dist\cli.mjs init --yes --retrieval lexical --tools none

      - name: Install ripgrep
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install ripgrep
        if: runner.os == 'macOS'
        run: brew install ripgrep

      - name: Install ripgrep
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install ripgrep -y --no-progress

      - name: Smoke grep
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set +e
          node dist/cli.mjs grep "memory"
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            exit 2
          fi

      - name: Smoke grep
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          node dist\cli.mjs grep "memory"
          if ($LASTEXITCODE -eq 2) {
            exit 2
          }
          exit 0

      - name: Smoke dashboard health
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          node dist/cli.mjs dashboard --no-open > "${RUNNER_TEMP}/dashboard.log" 2>&1 &
          dashboard_pid=$!
          cleanup() {
            kill "$dashboard_pid" 2>/dev/null || true
            wait "$dashboard_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          status=000
          for _ in {1..30}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4410/api/status 2>/dev/null || echo 000)
            if [ "$status" = "200" ]; then
              echo "dashboard OK"
              exit 0
            fi
            sleep 1
          done

          echo "dashboard failed to start"
          cat "${RUNNER_TEMP}/dashboard.log"
          exit 1

      - name: Smoke dashboard health
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dashboardOut = Join-Path $env:RUNNER_TEMP "dashboard.out.log"
          $dashboardErr = Join-Path $env:RUNNER_TEMP "dashboard.err.log"
          $process = Start-Process `
            -FilePath "node" `
            -ArgumentList @("dist\cli.mjs", "dashboard", "--no-open") `
            -WorkingDirectory $PWD `
            -RedirectStandardOutput $dashboardOut `
            -RedirectStandardError $dashboardErr `
            -WindowStyle Hidden `
            -PassThru

          try {
            $status = "000"
            foreach ($i in 1..90) {
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:4410/api/status" -UseBasicParsing -TimeoutSec 2
                $status = [string][int]$response.StatusCode
              } catch {
                $status = "000"
              }

              if ($status -eq "200") {
                Write-Host "dashboard OK"
                exit 0
              }

              Start-Sleep -Seconds 1
            }

            Write-Host "dashboard failed to start"
            Get-Content -Path $dashboardOut -ErrorAction SilentlyContinue
            Get-Content -Path $dashboardErr -ErrorAction SilentlyContinue
            exit 1
          } finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Assert vault structure
        if: runner.os != 'Windows'
        shell: bash
        run: |
          test -f "${MEMORY_ROOT}/schema.md"
          test -f "${MEMORY_ROOT}/index.md"
          test -f "${MEMORY_ROOT}/config.yaml"

      - name: Assert vault structure
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $requiredPaths = @(
            (Join-Path $env:MEMORY_ROOT "schema.md"),
            (Join-Path $env:MEMORY_ROOT "index.md"),
            (Join-Path $env:MEMORY_ROOT "config.yaml")
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path -LiteralPath $path)) {
              throw "missing vault file: $path"
            }
          }

  # Launches the actual Electron desktop shell (electron/main.ts) on each OS and
  # verifies the in-process dashboard server answers. This is how the macOS build
  # gets verified without a physical Mac — the GitHub macOS runner is the tester.
  electron:
    name: Electron launch (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Set isolated memory root
        if: runner.os != 'Windows'
        shell: bash
        run: echo "MEMORY_ROOT=${RUNNER_TEMP}/memory-home" >> "$GITHUB_ENV"

      - name: Set isolated memory root
        if: runner.os == 'Windows'
        shell: pwsh
        run: '"MEMORY_ROOT=$env:RUNNER_TEMP\memory-home" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append'

      # Electron needs a display + system libs on Linux; runners ship them but
      # xvfb provides the virtual display and --no-sandbox avoids the SUID
      # sandbox requirement in CI.
      - name: Install Electron Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm1 libnss3 libatk-bridge2.0-0 libgtk-3-0 libasound2t64

      # The electron npm postinstall occasionally downloads but fails to extract
      # the binary ("Electron failed to install correctly"); re-run it with
      # retries so the launch smoke doesn't flake on a missing binary.
      - name: Ensure Electron binary
        shell: bash
        run: |
          for i in 1 2 3; do
            if node -e "require('node:fs').accessSync(require('electron'))" 2>/dev/null; then
              echo "electron binary present"
              exit 0
            fi
            echo "electron binary missing — reinstall attempt $i"
            node node_modules/electron/install.js || true
          done
          # The electron binary download is an external GitHub fetch and flakes
          # (rate-limiting / partial extract). If it can't be obtained, skip the
          # launch smoke rather than failing the build — a genuine launch/serve
          # failure (binary present but app broken) is still caught below.
          echo "::warning::Electron binary unavailable after retries; skipping launch smoke"
          echo "ELECTRON_SMOKE_SKIP=1" >> "$GITHUB_ENV"

      - name: Electron launch smoke (Linux)
        if: runner.os == 'Linux' && env.ELECTRON_SMOKE_SKIP != '1'
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run -a npx electron . --no-sandbox > "${RUNNER_TEMP}/electron.log" 2>&1 &
          app_pid=$!
          cleanup() {
            kill "$app_pid" 2>/dev/null || true
            wait "$app_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4410/memory/api/status 2>/dev/null || echo 000)
            if [ "$status" = "200" ]; then
              echo "electron app OK"
              exit 0
            fi
            sleep 1
          done

          echo "electron app failed to serve"
          cat "${RUNNER_TEMP}/electron.log" || true
          exit 1

      - name: Electron launch smoke (macOS)
        if: runner.os == 'macOS' && env.ELECTRON_SMOKE_SKIP != '1'
        shell: bash
        run: |
          set -euo pipefail
          npx electron . > "${RUNNER_TEMP}/electron.log" 2>&1 &
          app_pid=$!
          cleanup() {
            kill "$app_pid" 2>/dev/null || true
            wait "$app_pid" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 60); do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4410/memory/api/status 2>/dev/null || echo 000)
            if [ "$status" = "200" ]; then
              echo "electron app OK"
              exit 0
            fi
            sleep 1
          done

          echo "electron app failed to serve"
          cat "${RUNNER_TEMP}/electron.log" || true
          exit 1

      - name: Electron launch smoke (Windows)
        if: runner.os == 'Windows' && env.ELECTRON_SMOKE_SKIP != '1'
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "electron.log"
          # Launch the real electron.exe directly — Start-Process with "npx"
          # resolves to the extensionless shell shim ("%1 is not a valid Win32
          # application") on Windows runners.
          $electron = Join-Path $PWD "node_modules\electron\dist\electron.exe"
          $process = Start-Process `
            -FilePath $electron `
            -ArgumentList @(".") `
            -WorkingDirectory $PWD `
            -RedirectStandardOutput $log `
            -RedirectStandardError "$log.err" `
            -WindowStyle Hidden `
            -PassThru

          try {
            foreach ($i in 1..90) {
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:4410/memory/api/status" -UseBasicParsing -TimeoutSec 2
                if ([int]$response.StatusCode -eq 200) {
                  Write-Host "electron app OK"
                  exit 0
                }
              } catch {}
              Start-Sleep -Seconds 1
            }

            Write-Host "electron app failed to serve"
            Get-Content -Path $log -ErrorAction SilentlyContinue
            Get-Content -Path "$log.err" -ErrorAction SilentlyContinue
            exit 1
          } finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

  electron-native-capability:
    name: Electron native capability (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Rebuild native modules for Electron ABI
        run: npm run electron:rebuild

      # Electron needs a display + system libs on Linux; runners ship them but
      # xvfb provides the virtual display and --no-sandbox avoids the SUID
      # sandbox requirement in CI.
      - name: Install Electron Linux deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgbm1 libnss3 libatk-bridge2.0-0 libgtk-3-0 libasound2t64

      # Keep the launch resilient to occasional partial Electron extraction,
      # but this capability gate must fail if no Electron binary is available.
      - name: Ensure Electron binary
        shell: bash
        run: |
          for i in 1 2 3; do
            if node -e "require('node:fs').accessSync(require('electron'))" 2>/dev/null; then
              echo "electron binary present"
              exit 0
            fi
            echo "electron binary missing — reinstall attempt $i"
            node node_modules/electron/install.js || true
          done
          echo "::error::Electron binary unavailable after retries; cannot run native capability gate"
          exit 1

      - name: Electron native capability gate (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set +e
          MEMORY_CAP_TEST=1 xvfb-run -a npx electron . --no-sandbox > "${RUNNER_TEMP}/electron-capability.log" 2>&1
          code=$?
          set -e
          cat "${RUNNER_TEMP}/electron-capability.log"
          if [ "$code" -ne 0 ]; then
            exit "$code"
          fi
          grep -F "[cap-test] electron=" "${RUNNER_TEMP}/electron-capability.log"
          grep -F "[cap-test] CAP_FTS5 ok" "${RUNNER_TEMP}/electron-capability.log"
          grep -F "[cap-test] CAP_VEC_KNN ok" "${RUNNER_TEMP}/electron-capability.log"

      - name: Electron native capability gate (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set +e
          MEMORY_CAP_TEST=1 npx electron . > "${RUNNER_TEMP}/electron-capability.log" 2>&1
          code=$?
          set -e
          cat "${RUNNER_TEMP}/electron-capability.log"
          if [ "$code" -ne 0 ]; then
            exit "$code"
          fi
          grep -F "[cap-test] electron=" "${RUNNER_TEMP}/electron-capability.log"
          grep -F "[cap-test] CAP_FTS5 ok" "${RUNNER_TEMP}/electron-capability.log"
          grep -F "[cap-test] CAP_VEC_KNN ok" "${RUNNER_TEMP}/electron-capability.log"

      - name: Electron native capability gate (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:MEMORY_CAP_TEST = "1"
          $log = Join-Path $env:RUNNER_TEMP "electron-capability.log"
          $err = Join-Path $env:RUNNER_TEMP "electron-capability.err.log"
          $electron = Join-Path $PWD "node_modules\electron\dist\electron.exe"
          $process = Start-Process `
            -FilePath $electron `
            -ArgumentList @(".") `
            -WorkingDirectory $PWD `
            -RedirectStandardOutput $log `
            -RedirectStandardError $err `
            -WindowStyle Hidden `
            -Wait `
            -PassThru

          Get-Content -Path $log -ErrorAction SilentlyContinue
          Get-Content -Path $err -ErrorAction SilentlyContinue
          if ($process.ExitCode -ne 0) {
            exit $process.ExitCode
          }

          $stdout = Get-Content -Path $log -Raw
          if (-not $stdout.Contains("[cap-test] electron=")) {
            throw "missing Electron runtime metadata log"
          }
          if (-not $stdout.Contains("[cap-test] CAP_FTS5 ok")) {
            throw "missing CAP_FTS5 ok log"
          }
          if (-not $stdout.Contains("[cap-test] CAP_VEC_KNN ok")) {
            throw "missing CAP_VEC_KNN ok log"
          }
