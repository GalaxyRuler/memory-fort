clients:
  # Most clients default on so existing installs keep working. Set any client to false
  # to disable it without removing saved integration files. Run
  # `memory-fort disconnect <client>` to remove an integration.
  claude-code: true
  codex: true
  antigravity: true
  hermes: true
  pi: true
  openclaw: true
  opencoven: true
  opencode: true
  claude-desktop: true
  vscode: true
  # ChatGPT bridge is opt-in because it runs a local HTTP/SSE bridge.
  chatgpt: false

embedding:
  # Legacy fallback. New writes should use embedder above.
  provider: lexical
  model: lexical
  dim: 0

privacy:
  allowlist: []
