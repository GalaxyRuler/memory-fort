# memory-system runtime configuration
# Auto-generated by `memory init`. Safe to edit; settings take effect on next CLI invocation.

retention:
  raw_window_days: 90
  raw_compile_before_delete: true
  embeddings_prune_with_raw: true
  wiki_status_stale_days: 180
  crystals_never_auto_delete: true
  archive_before_delete: true

embedder:
  provider: lexical
  model: lexical

compile:
  scheduled: false
  cadence: daily

capture:
  max_input_bytes: 8192
  max_output_bytes: 8192

compress:
  max_input_bytes: 48000
  chunk_threshold_bytes: 48000
  max_chunks: 8
  max_call_tokens: 100000

auto_link:
  enabled: true
  similarity_threshold: 0.65
  title_threshold: 0.55
  mass_collision_threshold: 0.2
  exempt_hub_pages:
    - wiki/references/mcp-servers-available.md

